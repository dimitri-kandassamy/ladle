name: Build cookbook

on:
  push:
    branches: [main]
    tags: ["v*"]      # pushing a vX.Y tag cuts a versioned edition
  pull_request:
    branches: [main]

permissions:
  contents: write   # create releases
  pages: write      # deploy Pages
  id-token: write   # Pages OIDC

concurrency:
  group: cookbook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .

      # System libraries WeasyPrint needs at runtime (Pango/cairo); poppler for
      # pdfinfo + cover rasterisation. Pandoc is pinned to a known-good release —
      # the distro's apt package lags and its EPUB writer emitted broken
      # cross-references (epubcheck RSC-007); pinning keeps CI in lockstep with
      # the version recipes are validated against locally.
      - name: Install system tools (pandoc, poppler, WeasyPrint libs)
        env:
          PANDOC_VERSION: "3.10-1"
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils \
            libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev libcairo2
          curl -sL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION%-*}/pandoc-${PANDOC_VERSION}-amd64.deb" -o pandoc.deb
          sudo apt-get install -y ./pandoc.deb
          pandoc --version | head -1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install epubcheck
        run: |
          EC=5.1.0
          curl -sL "https://github.com/w3c/epubcheck/releases/download/v${EC}/epubcheck-${EC}.zip" -o ec.zip
          unzip -oq ec.zip -d tools/epubcheck
          ln -sf "epubcheck-${EC}/epubcheck.jar" tools/epubcheck/epubcheck.jar

      - name: Build PDF + EPUB
        env:
          BOOK: examples/community-cookbook/book.yaml
        run: |
          ladle illustrations --book "$BOOK"
          ladle build --book "$BOOK"

      - name: Validate
        run: ladle validate --book examples/community-cookbook/book.yaml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cookbook
          path: |
            build/cookbook.pdf
            build/cookbook.epub
            build/contact-sheet.png

      # Everyday builds on main update a single rolling "latest" release. It is
      # not the repo's Latest badge (that's reserved for tagged editions); link to
      # it with the stable URL .../releases/download/latest/cookbook.pdf
      - name: Publish rolling build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (rolling)
          prerelease: true
          make_latest: false
          files: |
            build/cookbook.pdf
            build/cookbook.epub

      # A vX.Y.Z tag releases the *tool* to PyPI (see the publish-pypi job below),
      # not a book edition — cutting citeable book editions belongs to a book's
      # own repo, which pip-installs ladle.

      # Pages deploy is opt-in: set repository variable ENABLE_PAGES=true once you've
      # enabled Pages (Settings → Pages → Source: GitHub Actions). This keeps the build
      # and Release green on private/free repos where Pages isn't available.
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  # Builds tests/fixtures/torture-book — one recipe designed to exercise a
  # quoted title (epubcheck's FATAL(RSC-016) escaping bug), an unusually long
  # NOTES section (the PDF page-count diagnostic), missing optional fields,
  # and accented characters. A separate job (not a step in `build` above)
  # because BUILD is a single global build/ dir regardless of --book, so
  # running both books in one job's workspace would let this fixture's PDF
  # clobber the real book's build/cookbook.pdf right before `build`'s own
  # upload/publish steps use it.
  torture-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .

      - name: Install system tools (pandoc, poppler, WeasyPrint libs)
        env:
          PANDOC_VERSION: "3.10-1"
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils \
            libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev libcairo2
          curl -sL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION%-*}/pandoc-${PANDOC_VERSION}-amd64.deb" -o pandoc.deb
          sudo apt-get install -y ./pandoc.deb

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install epubcheck
        run: |
          EC=5.1.0
          curl -sL "https://github.com/w3c/epubcheck/releases/download/v${EC}/epubcheck-${EC}.zip" -o ec.zip
          unzip -oq ec.zip -d tools/epubcheck
          ln -sf "epubcheck-${EC}/epubcheck.jar" tools/epubcheck/epubcheck.jar

      - name: Build + validate torture-test fixture
        run: |
          BOOK=tests/fixtures/torture-book/book.yaml
          ladle illustrations --book "$BOOK"
          ladle build --book "$BOOK"
          ladle validate --book "$BOOK"

  # Release the tool to PyPI on a vX.Y.Z tag. The tag's version must match
  # pyproject.toml's version (enforced by the guard step below). Uses PyPI
  # Trusted Publishing (OIDC) — no token: configure a trusted publisher for the
  # 'ladlebook' project on PyPI and a 'pypi' environment on this repo. Runs only
  # after tests pass.
  publish-pypi:
    needs: [build, torture-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ladlebook
    permissions:
      id-token: write   # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Fail early (before building/publishing) if the pushed tag doesn't match
      # the package version. A version can never be re-uploaded to PyPI, so a
      # mismatched tag would otherwise burn the intended version number.
      - name: Check tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match pyproject version $pkg" >&2
            exit 1
          fi
          echo "tag matches pyproject version: $pkg"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy-pages:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PAGES == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
