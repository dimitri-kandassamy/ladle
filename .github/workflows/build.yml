name: Build cookbook

on:
  push:
    branches: [main]
    tags: ["v*"]      # pushing a vX.Y tag cuts a versioned edition
  pull_request:
    branches: [main]

permissions:
  contents: write   # create releases
  pages: write      # deploy Pages
  id-token: write   # Pages OIDC

concurrency:
  group: cookbook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install

      # Pin pandoc to a known-good release. The distro's apt package lags and its
      # EPUB writer emitted broken cross-references (epubcheck RSC-007); pinning
      # keeps CI in lockstep with the version recipes are validated against locally.
      - name: Install pandoc + poppler
        env:
          PANDOC_VERSION: "3.10-1"
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          curl -sL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION%-*}/pandoc-${PANDOC_VERSION}-amd64.deb" -o pandoc.deb
          sudo apt-get install -y ./pandoc.deb
          pandoc --version | head -1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install epubcheck
        run: |
          EC=5.1.0
          curl -sL "https://github.com/w3c/epubcheck/releases/download/v${EC}/epubcheck-${EC}.zip" -o ec.zip
          unzip -oq ec.zip -d tools/epubcheck
          ln -sf "epubcheck-${EC}/epubcheck.jar" tools/epubcheck/epubcheck.jar

      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable

      - name: Build PDF + EPUB
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          python3 tools/gen_illustrations.py
          python3 tools/build_html.py
          node tools/make_pdf.mjs
          bash tools/make_epub.sh

      - name: Validate
        run: python3 tools/validate.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cookbook
          path: |
            build/cookbook.pdf
            build/cookbook.epub
            build/contact-sheet.png

      # Everyday builds on main update a single rolling "latest" release. It is
      # not the repo's Latest badge (that's reserved for tagged editions); link to
      # it with the stable URL .../releases/download/latest/cookbook.pdf
      - name: Publish rolling build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build (rolling)
          prerelease: true
          make_latest: false
          files: |
            build/cookbook.pdf
            build/cookbook.epub

      # Pushing a vX.Y tag cuts a citeable, versioned edition (newest = Latest badge).
      - name: Publish edition
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          make_latest: true
          files: |
            build/cookbook.pdf
            build/cookbook.epub

      # Pages deploy is opt-in: set repository variable ENABLE_PAGES=true once you've
      # enabled Pages (Settings → Pages → Source: GitHub Actions). This keeps the build
      # and Release green on private/free repos where Pages isn't available.
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy-pages:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_PAGES == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
