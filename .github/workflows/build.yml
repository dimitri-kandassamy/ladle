name: Build cookbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # create releases
  pages: write      # deploy Pages
  id-token: write   # Pages OIDC

concurrency:
  group: cookbook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install

      - name: Install pandoc + poppler
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc poppler-utils

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install epubcheck
        run: |
          EC=5.1.0
          curl -sL "https://github.com/w3c/epubcheck/releases/download/v${EC}/epubcheck-${EC}.zip" -o ec.zip
          unzip -oq ec.zip -d tools/epubcheck
          ln -sf "epubcheck-${EC}/epubcheck.jar" tools/epubcheck/epubcheck.jar

      - uses: browser-actions/setup-chrome@v1
        id: chrome
        with:
          chrome-version: stable

      - name: Build PDF + EPUB
        env:
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          python3 tools/gen_illustrations.py
          python3 tools/build_html.py
          node tools/make_pdf.mjs
          bash tools/make_epub.sh

      - name: Validate
        run: python3 tools/validate.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cookbook
          path: |
            build/cookbook.pdf
            build/cookbook.epub
            build/contact-sheet.png

      - name: Publish Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          files: |
            build/cookbook.pdf
            build/cookbook.epub

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy-pages:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
