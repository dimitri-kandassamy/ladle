version: 2
updates:
  # Keep GitHub Actions pinned-by-SHA up to date (Dependabot bumps the SHA and
  # updates the trailing version comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Python runtime dependencies declared in pyproject.toml.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
