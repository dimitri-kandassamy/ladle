# The Ladle Kitchen — an example book that ships with the `ladle` tool.
# This single file drives titles, palette, fonts, and recipe ordering for both
# the PDF and EPUB builds. Build it with:
#   make all                                       # this is the default book
#   ladle build --book examples/the-ladle-kitchen/book.yaml

title: The Ladle Kitchen
subtitle: A sample book that ships with the ladle tool
volume: "1.0"
language: en
producer: The ladle project
rights: "© 2026 The ladle project — sample recipes, CC BY-SA 4.0"
content_license: CC-BY-SA-4.0
repo_url: https://github.com/dimitri-kandassamy/ladle

# Design bundle (templates/css/fonts). `default` is the theme shipped in the
# package; point this at a directory to use a book-local theme instead.
theme: default

# Design tokens — a warm navy-and-cream palette for the default theme.
palette:
  navy: "#16203a"
  cream: "#faefdb"
  ink: "#3c3c3c"        # soft charcoal (primary text)
  ink_deep: "#231f20"   # warm near-black (ingredients, footer)
  rule: "#c9bfa6"

# Open-licensed type: a Didone display face paired with a slab-serif body.
fonts:
  display: "Playfair Display"
  body: "Bitter"

# Section order. Recipes are grouped by their `category` frontmatter and
# appear in this order; within a section they follow `order` (below) then
# fall back to alphabetical by title.
sections:
  - Savory
  - Desserts
  - Beverages

# Optional explicit recipe ordering by slug. Slugs not listed sort alphabetically
# within their category section.
order: []

# Front matter content page.
introduction: content/introduction.md

# Optional: override the book's chrome strings for a non-English edition.
# Any key omitted here falls back to the English default, so this whole
# block can be left out entirely (as it is by default).
